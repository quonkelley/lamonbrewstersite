<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamon Brewster | Hall of Fame Gallery</title>
    <meta
      name="description"
      content="Hall of Fame style gallery of Lamon Brewster in action—training clips, championship moments, and behind-the-scenes visuals."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                oswald: ["Oswald", "sans-serif"],
                roboto: ["Roboto", "sans-serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="bg-gray-900 text-white font-roboto overflow-x-hidden">
    <!-- Navbar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-gray-900/90 backdrop-blur border-b border-gray-800">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16 min-w-0">
        <a href="index.html#home" class="min-w-0 flex-shrink-0">
          <span
            class="font-oswald text-lg sm:text-xl tracking-[0.2em] sm:tracking-[0.25em] uppercase text-yellow-500 truncate block"
          >
            Lamon Brewster
          </span>
        </a>
        <!-- Hamburger (desktop + mobile) -->
        <div class="flex-shrink-0 ml-2">
          <button
            type="button"
            id="mobile-menu-button"
            aria-expanded="false"
            aria-controls="mobile-menu"
            aria-label="Open menu"
            class="p-2 rounded-lg text-gray-300 hover:text-yellow-400 hover:bg-gray-800 transition"
          >
            <i id="mobile-menu-icon-open" class="fas fa-bars text-xl"></i>
            <i id="mobile-menu-icon-close" class="fas fa-times text-xl hidden" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Drawer menu (desktop + mobile) -->
    <div
      id="mobile-menu"
      class="hidden fixed inset-0 z-[100]"
      role="dialog"
      aria-label="Navigation menu"
    >
      <button
        type="button"
        id="mobile-menu-backdrop"
        class="absolute inset-0 bg-black/70 z-0"
        aria-label="Close menu"
      ></button>
      <nav
        class="absolute top-0 right-0 h-full w-[86vw] max-w-sm bg-gray-950 border-l border-gray-800 shadow-2xl shadow-black/60 px-4 py-5 overflow-y-auto z-10"
        aria-label="Site navigation links"
      >
        <p class="text-xs uppercase tracking-[0.35em] text-yellow-500 mb-3">
          Menu
        </p>
        <div class="flex flex-col gap-1">
          <a href="index.html#home" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">Home</a>
          <a href="index.html#about" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">About</a>
          <a href="index.html#services" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">Training Services</a>
          <a href="index.html#gym" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">The Gym</a>
          <a href="index.html#visuals" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">Visuals</a>
          <span class="py-3 px-3 rounded-lg bg-yellow-500/10 text-yellow-300 font-medium">Gallery</span>
          <a href="index.html#contact" class="mobile-nav-link py-3 px-3 rounded-lg hover:bg-gray-800 hover:text-yellow-400 text-gray-200 font-medium">Contact</a>
        </div>
      </nav>
    </div>

    <main class="pt-20 pb-16 min-w-0">
      <!-- Hero / Intro -->
      <section class="py-10 sm:py-14 bg-gradient-to-b from-black via-gray-900 to-gray-950 border-b border-gray-800">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
          <p class="text-xs uppercase tracking-[0.4em] text-yellow-500 mb-3">
            Hall of Fame
          </p>
          <h1 class="font-oswald text-3xl sm:text-4xl md:text-5xl font-semibold mb-3">
            Lamon Brewster Gallery
          </h1>
          <p class="text-gray-300 text-sm sm:text-base max-w-2xl mx-auto">
            Clips from training, the gym, and championship moments. A hall-of-fame look at the work, the mindset,
            and the legacy.
          </p>
        </div>
      </section>

      <!-- Gallery Grid -->
      <section class="py-10 sm:py-14">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between gap-4 mb-6">
            <h2 class="font-oswald text-xl sm:text-2xl font-semibold">
              In Action
            </h2>
            <a
              href="index.html#visuals"
              class="text-xs sm:text-sm text-gray-300 hover:text-yellow-400 transition-colors"
            >
              Back to site visuals
            </a>
          </div>

          <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Card: clip1 -->
            <button
              type="button"
              class="group relative rounded-2xl overflow-hidden border border-gray-700 bg-gray-900/60 shadow-lg shadow-black/40 hover:shadow-xl hover:shadow-black/60 hover:-translate-y-1 transition transform text-left"
              data-clip-src="assets/clip1.mp4"
              data-clip-label="Training Clip 1"
            >
              <div class="aspect-video bg-black flex items-center justify-center">
                <img
                    src="assets/clip1-thumb.png"
                    alt="Training clip 1 thumbnail"
                    class="w-full h-full object-cover"
                    loading="lazy"
                  />
              </div>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span
                  class="inline-flex items-center justify-center h-14 w-14 rounded-full bg-black/60 text-yellow-400 border border-yellow-500/70 group-hover:bg-yellow-500 group-hover:text-black group-hover:border-yellow-400 transition"
                >
                  <i class="fas fa-play text-xl translate-x-[1px]"></i>
                </span>
              </div>
              <div class="px-4 py-3 border-t border-gray-800">
                <p class="font-oswald text-sm tracking-[0.16em] uppercase text-gray-300">
                  Lamon Brewster - Relentless Power
                </p>
                <p class="text-xs text-gray-500 mt-1">
                  Technique, power, and focus.
                </p>
              </div>
            </button>

            <!-- Card: clip2 -->
            <button
              type="button"
              class="group relative rounded-2xl overflow-hidden border border-gray-700 bg-gray-900/60 shadow-lg shadow-black/40 hover:shadow-xl hover:shadow-black/60 hover:-translate-y-1 transition transform text-left"
              data-clip-src="assets/clip2.mp4"
              data-clip-label="Training Clip 2"
            >
              <div class="aspect-video bg-black flex items-center justify-center">
                <img
                  src="assets/clip2-thumb.png"
                  alt="Training clip 2 thumbnail"
                  class="w-full h-full object-cover"
                  loading="lazy"
                />
              </div>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span
                  class="inline-flex items-center justify-center h-14 w-14 rounded-full bg-black/60 text-yellow-400 border border-yellow-500/70 group-hover:bg-yellow-500 group-hover:text-black group-hover:border-yellow-400 transition"
                >
                  <i class="fas fa-play text-xl translate-x-[1px]"></i>
                </span>
              </div>
              <div class="px-4 py-3 border-t border-gray-800">
                <p class="font-oswald text-sm tracking-[0.16em] uppercase text-gray-300">
                  Mike Epps Gets in the Ring with Boxing Champ Laymon Brewster at Right Jab Grand Opening
                </p>
                <p class="text-xs text-gray-500 mt-1">
                  Grand Opening; Mike Epps; Right Jab Boxing Gym; Indianapolis, IN;
                </p>
              </div>
            </button>

            <!-- Card: clip3 -->
            <button
              type="button"
              class="group relative rounded-2xl overflow-hidden border border-gray-700 bg-gray-900/60 shadow-lg shadow-black/40 hover:shadow-xl hover:shadow-black/60 hover:-translate-y-1 transition transform text-left"
              data-clip-src="assets/clip3.mp4"
              data-clip-label="Training Clip 3"
            >
              <div class="aspect-video bg-black flex items-center justify-center">
                <img
                  src="assets/clip3-thumb.png"
                  alt="Training clip 3 thumbnail"
                  class="w-full h-full object-cover"
                  loading="lazy"
                />
              </div>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span
                  class="inline-flex items-center justify-center h-14 w-14 rounded-full bg-black/60 text-yellow-400 border border-yellow-500/70 group-hover:bg-yellow-500 group-hover:text-black group-hover:border-yellow-400 transition"
                >
                  <i class="fas fa-play text-xl translate-x-[1px]"></i>
                </span>
              </div>
              <div class="px-4 py-3 border-t border-gray-800">
                <p class="font-oswald text-sm tracking-[0.16em] uppercase text-gray-300">
                  Lamon Brewster on How to Throw a powerful hook (The Crank)
                </p>
                <p class="text-xs text-gray-500 mt-1">
                  Boxing; Hook; The Crank; Lamon Brewster;
                </p>
              </div>
            </button>

            <!-- Card: clip4 -->
            <button
              type="button"
              class="group relative rounded-2xl overflow-hidden border border-gray-700 bg-gray-900/60 shadow-lg shadow-black/40 hover:shadow-xl hover:shadow-black/60 hover:-translate-y-1 transition transform text-left"
              data-clip-src="assets/clip4.mp4"
              data-clip-label="Training Clip 4"
            >
              <div class="aspect-video bg-black flex items-center justify-center">
                <img
                  src="assets/clip4-thumb.png"
                  alt="Training clip 4 thumbnail"
                  class="w-full h-full object-cover"
                  loading="lazy"
                />
              </div>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span
                  class="inline-flex items-center justify-center h-14 w-14 rounded-full bg-black/60 text-yellow-400 border border-yellow-500/70 group-hover:bg-yellow-500 group-hover:text-black group-hover:border-yellow-400 transition"
                >
                  <i class="fas fa-play text-xl translate-x-[1px]"></i>
                </span>
              </div>
              <div class="px-4 py-3 border-t border-gray-800">
                <p class="font-oswald text-sm tracking-[0.16em] uppercase text-gray-300">
                  The Right Jab Boxing Gym Indianapolis, IN
                </p>
                <p class="text-xs text-gray-500 mt-1">
                  Boxing Gym
                </p>
              </div>
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal Player -->
    <div
      id="gallery-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm"
      aria-hidden="true"
    >
      <div class="relative max-w-3xl w-full mx-4">
        <button
          type="button"
          id="gallery-modal-close"
          class="absolute -top-10 right-0 text-gray-300 hover:text-yellow-400 transition-colors text-2xl"
          aria-label="Close video"
        >
          <i class="fas fa-times"></i>
        </button>
        <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-gray-700 shadow-2xl shadow-black/60">
          <video
            id="gallery-modal-video"
            class="w-full h-full object-contain bg-black"
            controls
            playsinline
          ></video>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var button = document.getElementById('mobile-menu-button');
        var menu = document.getElementById('mobile-menu');
        var backdrop = document.getElementById('mobile-menu-backdrop');
        var iconOpen = document.getElementById('mobile-menu-icon-open');
        var iconClose = document.getElementById('mobile-menu-icon-close');
        if (!button || !menu) return;

        function openMenu() {
          menu.classList.remove('hidden');
          button.setAttribute('aria-expanded', 'true');
          button.setAttribute('aria-label', 'Close menu');
          if (iconOpen) iconOpen.classList.add('hidden');
          if (iconClose) iconClose.classList.remove('hidden');
        }
        function closeMenu() {
          menu.classList.add('hidden');
          button.setAttribute('aria-expanded', 'false');
          button.setAttribute('aria-label', 'Open menu');
          if (iconOpen) iconOpen.classList.remove('hidden');
          if (iconClose) iconClose.classList.add('hidden');
        }

        button.addEventListener('click', function () {
          if (menu.classList.contains('hidden')) openMenu();
          else closeMenu();
        });
        if (backdrop) backdrop.addEventListener('click', closeMenu);
        menu.querySelectorAll('.mobile-nav-link').forEach(function (link) {
          link.addEventListener('click', closeMenu);
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && !menu.classList.contains('hidden')) closeMenu();
        });

        var modal = document.getElementById('gallery-modal');
        var modalVideo = document.getElementById('gallery-modal-video');
        var modalClose = document.getElementById('gallery-modal-close');
        if (!modal || !modalVideo) return;

        function openModal(src, label) {
          if (!src) return;
          modalVideo.src = src;
          if (label) modalVideo.setAttribute('aria-label', label);
          modal.classList.remove('hidden');
          modal.classList.add('flex');
          var p = modalVideo.play();
          if (p && typeof p.catch === 'function') p.catch(function () {});
        }

        function closeModal() {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          try { modalVideo.pause(); } catch (e) {}
          modalVideo.removeAttribute('src');
        }

        document.querySelectorAll('[data-clip-src]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            openModal(btn.getAttribute('data-clip-src'), btn.getAttribute('data-clip-label') || '');
          });
        });

        if (modalClose) {
          modalClose.addEventListener('click', closeModal);
        }

        modal.addEventListener('click', function (e) {
          if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
            closeModal();
          }
        });
      })();
    </script>
  </body>
</html>
